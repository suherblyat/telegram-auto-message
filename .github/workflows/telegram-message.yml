name: Telegram Auto Message

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  send-message:
    runs-on: ubuntu-latest
    steps:
      - name: Send Telegram message only from 07 to 22 local time every 3 hours
        run: |
          hour=$(TZ="Europe/Vienna" date +%H)
          h=$((10#$hour))

          if (( h >= 7 && h <= 22 && (h - 7) % 3 == 0 )); then
            curl -s -X POST "https://api.telegram.org/bot${{ secrets.BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.CHAT_ID }}" \
            -d "text=[ГРУПА ЗА РЕСУРСЕ] Придружите се другој групи где ћете наћи све православне и остале ресурсе: https://t.me/resursiced"
          else
            echo "Skipping. Current local hour is $hour."
          fi
